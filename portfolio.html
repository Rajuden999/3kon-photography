<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | 3Kon Photography</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div id="siteHeader"></div>

<section class="portfolio-banner">

    <img id="portfolioHeroImage" alt="Portfolio Hero">

</section>

<section class="portfolio-hero">

    <h1>Our Portfolio</h1>

    <p>
        A collection of weddings, events, portraits and unforgettable moments captured through our lens.
    </p>

</section>

<section class="hero">

    <div class="gallery-grid" id="portfolioGrid">

    </div>

</section>

<section class="video-section">

    <h2>Cinematic Stories</h2>

    <p class="video-subtitle">
        Relive beautiful moments through our cinematic storytelling.
    </p>

    <div id="videoHighlights" class="video-grid">

    </div>

</section>

<div id="siteFooter"></div>
<script src="js/settings.js"></script>
<script src="js/layout.js"></script>

<script src="js/portfolio.js"></script>
<script src="js/lightbox.js"></script>

<div id="lightbox" class="lightbox">

    <span class="close-lightbox">&times;</span>

    <img id="lightboxImg">

</div>
</body>
</html>
